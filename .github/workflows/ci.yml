name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.arch.label }} ${{ matrix.link }}
    runs-on: ${{ matrix.arch.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - runner: windows-2025
            triple: x86_64-unknown-windows-msvc
            build_arch: amd64
            label: x86_64
          - runner: windows-11-arm
            triple: aarch64-unknown-windows-msvc
            build_arch: arm64
            label: arm64
        link: [dynamic, static]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: development
          swift-build: DEVELOPMENT-SNAPSHOT-2026-04-30-a
          build_arch: ${{ matrix.arch.build_arch }}
          update-sdk-modules: true

      - name: Repoint SDKROOT at WindowsExperimental.sdk (static only)
        if: matrix.link == 'static'
        shell: pwsh
        run: |
          $sdk = "$(Split-Path -Path ${env:SDKROOT} -Parent)/WindowsExperimental.sdk"
          Write-Host "Redirecting SDKROOT -> $sdk"
          "SDKROOT=$sdk" >> $env:GITHUB_ENV

      - name: swift --version
        shell: pwsh
        run: swift --version

      - name: Show SDK directories
        shell: pwsh
        run: |
          $sdkParent = Split-Path -Path ${env:SDKROOT} -Parent
          if (-not $sdkParent) { $sdkParent = "$env:LOCALAPPDATA\Programs\Swift\Platforms\0.0.0\Windows.platform\Developer\SDKs" }
          Write-Host ("SDKROOT={0}" -f $env:SDKROOT)
          Write-Host ("Listing {0}" -f $sdkParent)
          Get-ChildItem $sdkParent | Format-Table Name,LastWriteTime

      - name: Build (dynamic)
        if: matrix.link == 'dynamic'
        shell: pwsh
        env:
          SWIFTPM_ENABLE_PLUGIN_LOGGING: "1"
          SWIFTPM_LOG_LEVEL: "debug"
        run: swift build --very-verbose --triple ${{ matrix.arch.triple }}

      - name: Build (static-stdlib)
        if: matrix.link == 'static'
        shell: pwsh
        env:
          SWIFTPM_ENABLE_PLUGIN_LOGGING: "1"
          SWIFTPM_LOG_LEVEL: "debug"
        run: |
          swift build --very-verbose --triple ${{ matrix.arch.triple }} `
            -Xswiftc -static-stdlib -debug-info-format none -Xswiftc -sdk -Xswiftc ${ExperimentalSDK}

      - name: Inspect plugin executable after failure (static only)
        if: failure() && matrix.link == 'static'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $exe = ".build\plugins\cache\BuildPlugin.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "Plugin executable not found at $exe; listing cache directory:"
            Get-ChildItem .build\plugins\cache -Recurse -ErrorAction SilentlyContinue
            exit 0
          }
          Write-Host "Plugin executable: $exe"
          Get-Item $exe | Format-List Length,LastWriteTime,Mode

          Write-Host "`n--- Direct invocation (expect protocol error on stdin) ---"
          $p = Start-Process -FilePath $exe -NoNewWindow -PassThru `
            -RedirectStandardOutput plugin.stdout.txt `
            -RedirectStandardError plugin.stderr.txt
          if (-not $p.WaitForExit(5000)) {
            Write-Host "Plugin did not exit within 5s; killing"
            $p.Kill()
          }
          Write-Host "ExitCode: $($p.ExitCode)"
          Write-Host "`n--- stdout ---"
          Get-Content plugin.stdout.txt -ErrorAction SilentlyContinue
          Write-Host "`n--- stderr ---"
          Get-Content plugin.stderr.txt -ErrorAction SilentlyContinue

          Write-Host "`n--- Imported DLLs and their resolution on PATH ---"
          $readobj = "$env:LOCALAPPDATA\Programs\Swift\Toolchains\0.0.0+Asserts\usr\bin\llvm-readobj.exe"
          $deps = & $readobj --coff-imports $exe |
            Select-String -Pattern '^\s*Name:\s+(.+)$' |
            ForEach-Object { $_.Matches[0].Groups[1].Value.Trim() } |
            Sort-Object -Unique
          foreach ($d in $deps) {
            $resolved = (Get-Command $d -ErrorAction SilentlyContinue)
            if ($resolved) {
              Write-Host ("  [FOUND]   {0,-30} -> {1}" -f $d, $resolved.Source)
            } else {
              Write-Host ("  [MISSING] {0}" -f $d)
            }
          }

          Write-Host "`n--- Listing Swift runtime DLL directory ---"
          $runtimeBin = "$env:LOCALAPPDATA\Programs\Swift\Runtimes\0.0.0\usr\bin"
          if (Test-Path $runtimeBin) {
            Get-ChildItem $runtimeBin -Filter *.dll | Format-Table Name,Length
          } else {
            Write-Host "Runtime directory not found: $runtimeBin"
          }

          Write-Host "`n--- Listing SDK redist usr/bin if present ---"
          $sdkBin = (Split-Path -Path $env:SDKROOT -Parent) + "\..\..\Runtimes\0.0.0\usr\bin"
          if (Test-Path $sdkBin) {
            Get-ChildItem $sdkBin -Filter *.dll -ErrorAction SilentlyContinue | Format-Table Name,Length
          }

      - name: Run product
        if: matrix.link == 'dynamic'
        shell: pwsh
        run: swift run --triple ${{ matrix.arch.triple }} plugintest
